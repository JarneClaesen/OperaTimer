name: Release APK

# Builds a release APK on GitHub's infrastructure and publishes it as a
# GitHub Release whenever a tag like v1.2.3 is pushed. The release build is
# debug-signed (see android/app/build.gradle), so no signing secrets are
# needed to produce an installable APK.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: >-
          flutter build apk --release
          --build-name=${{ steps.ver.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/OperaTimer${{ steps.ver.outputs.version }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/OperaTimer${{ steps.ver.outputs.version }}.apk
